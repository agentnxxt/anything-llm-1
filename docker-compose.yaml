###############################################################################
# UnlimitedLLM — Local development build
###############################################################################

name: unlimitedllm

services:
  unlimitedllm:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: unlimitedllm
    cap_add:
      - SYS_ADMIN
    ports:
      - "3001:3001"
    volumes:
      - unlimitedllm_storage:/app/server/storage
      - unlimitedllm_hotdir:/app/collector/hotdir
      - unlimitedllm_outputs:/app/collector/outputs
    environment:
      - STORAGE_DIR=/app/server/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  unlimitedllm_storage:
  unlimitedllm_hotdir:
  unlimitedllm_outputs:
